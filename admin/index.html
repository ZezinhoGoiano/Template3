<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Login — Apex Motors Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="admin.css" />
</head>
<body class="login-page">

  <div class="login-container">

    <!-- Logo -->
    <div class="login-logo">
      <svg width="160" height="42" viewBox="0 0 140 36" fill="none" aria-hidden="true">
        <path d="M6 28 L18 6 L30 28" stroke="#1E88E5" stroke-width="2.5" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10 28 L18 12 L26 28" stroke="#1E88E5" stroke-width="1.2" fill="none"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>
        <text x="36" y="24" font-family="Space Grotesk, sans-serif" font-weight="800"
          font-size="18" fill="#F5F5F5" letter-spacing="2">APEX</text>
        <text x="36" y="34" font-family="Inter, sans-serif" font-weight="400"
          font-size="9" fill="#8B949E" letter-spacing="4">MOTORS</text>
      </svg>
      <span class="login-logo__badge">ADMIN</span>
    </div>

    <!-- Card de Login -->
    <div class="login-card" id="loginCard">

      <h1 class="login-card__title">Bem-vindo de volta</h1>
      <p class="login-card__subtitle">Entre com suas credenciais para acessar o painel</p>

      <form id="loginForm" class="login-form" novalidate>

        <div class="form-group">
          <label class="form-label" for="loginEmail">E-mail</label>
          <input type="email" id="loginEmail" name="email" class="form-input"
            placeholder="seu@email.com" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Senha</label>
          <div class="password-wrap">
            <input type="password" id="loginPassword" name="password" class="form-input"
              placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="password-toggle" id="togglePassword" aria-label="Mostrar senha">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="loginError" class="login-error" hidden></div>

        <button type="submit" class="btn btn--primary btn--full" id="loginSubmit">
          <span id="loginSubmitText">Entrar</span>
        </button>

        <button type="button" class="login-forgot" id="showForgotPassword">
          Esqueci minha senha
        </button>

      </form>

    </div>

    <!-- Card de Recuperação de Senha -->
    <div class="login-card" id="forgotCard" hidden>

      <button type="button" class="login-back" id="backToLogin" aria-label="Voltar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Voltar
      </button>

      <h1 class="login-card__title">Recuperar senha</h1>
      <p class="login-card__subtitle">
        Digite seu e-mail cadastrado e enviaremos um link para redefinir sua senha.
      </p>

      <form id="forgotForm" class="login-form" novalidate>

        <div class="form-group">
          <label class="form-label" for="forgotEmail">E-mail</label>
          <input type="email" id="forgotEmail" name="email" class="form-input"
            placeholder="seu@email.com" autocomplete="email" required />
        </div>

        <div id="forgotMessage" class="login-message" hidden></div>

        <button type="submit" class="btn btn--primary btn--full" id="forgotSubmit">
          <span id="forgotSubmitText">Enviar link de recuperação</span>
        </button>

      </form>

    </div>

    <p class="login-footer">
      &copy; <span id="loginYear"></span> Apex Motors. Painel administrativo restrito.
    </p>

  </div>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="login.js"></script>

</body>
</html>
